name: Deploy Vue to GitHub Pages

on:
  push:
    branches:
      - main # Hoặc tên nhánh chính của bạn (master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Thư mục chứa code sau khi build của Vue
          branch: gh-pages # Nhánh mà GitHub Pages sẽ dùng để hiển thị web
